name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Validate SQL parses under BigQuery dialect
        run: |
          pip install --quiet sqlglot
          python -c "
          import sqlglot, sys
          from pathlib import Path
          errors = []
          for p in sorted(Path('sql').rglob('*.sql')):
              try:
                  sqlglot.parse(p.read_text(encoding='utf-8'), dialect='bigquery')
                  print(f'OK  {p}')
              except Exception as e:
                  errors.append((p, e))
                  print(f'ERR {p}: {e}')
          sys.exit(1 if errors else 0)
          "
