[tool.ruff]
target-version = "py312"
line-length = 110
extend-exclude = ["build", "dist", ".venv"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "SIM", "C4", "N"]
ignore = ["E501"]  # line-length is enforced by formatter

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers"
pythonpath = ["functions/ingest", "functions/transform_load", "scripts"]
